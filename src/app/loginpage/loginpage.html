<div class="center-wrapper">
  <div class="Loginpage">
    <form #loginForm="ngForm" (ngSubmit)="login()">
      <h2>Task Sheet Login</h2>

      <label for="username">Username</label>
      <input type="text" name="username" [(ngModel)]="username" placeholder="Enter your username" required />

      <label for="password">Password</label>
      <input type="password" name="password" [(ngModel)]="password" placeholder="Enter your password" required />

      <div class="options">
        <label>
          <input type="checkbox" name="rememberMe" /> Remember me
        </label>
        <a class="forgotpassword" (click)="forgot()">Forgot Password?</a>
      </div>

      <button type="submit" [disabled]="loginForm.invalid">Login</button>
    </form>
  </div>
</div>
